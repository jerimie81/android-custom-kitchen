name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install apt dependencies for headless PyQt tests
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends xvfb

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyQt5 ruff black mypy pytest

      - name: Ruff
        run: ruff check .

      - name: Black
        run: black --check .

      - name: Mypy (strict)
        run: mypy --strict ackitchen

      - name: Pytest (xvfb)
        run: xvfb-run -a pytest
